<section class="section contact" id="contact">
  <div class="container">
    <div class="contact-inner">
      <div class="section-header">
        <h2 class="section-title">Let's Work Together</h2>
        <p class="section-subtitle">Open to new full-stack opportunities. Whether you have a role in mind or just want to connect, I'd love to hear from you.</p>
      </div>

      <div class="contact-linkedin">
        <a href="{{ .Site.Params.linkedin }}" class="btn btn--primary" target="_blank" rel="noopener noreferrer">
          <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
          Connect on LinkedIn
        </a>
      </div>

      <div class="contact-divider">
        <span>or send a message</span>
      </div>

      <form
        class="contact-form"
        name="contact"
        method="POST"
        data-netlify="true"
        netlify-honeypot="bot-field"
        action="/thank-you"
      >
        <input type="hidden" name="form-name" value="contact" />
        <p class="visually-hidden">
          <label>Don't fill this out if you're human: <input name="bot-field" /></label>
        </p>
        <div class="form-row">
          <div class="form-group">
            <label for="contact-name" class="form-label">Name</label>
            <input type="text" id="contact-name" name="name" class="form-input" placeholder="Jane Smith" required autocomplete="name" />
          </div>
          <div class="form-group">
            <label for="contact-email" class="form-label">Email</label>
            <input type="email" id="contact-email" name="email" class="form-input" placeholder="jane@company.com" required autocomplete="email" />
          </div>
        </div>
        <div class="form-group">
          <label for="contact-message" class="form-label">Message</label>
          <textarea id="contact-message" name="message" class="form-input form-textarea" placeholder="Tell me about the role or project..." rows="5" required></textarea>
        </div>
        <button type="submit" class="btn btn--primary">Send Message</button>
      </form>
    </div>
  </div>
</section>
