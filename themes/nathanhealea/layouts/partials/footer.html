{{- /* Site footer. */ -}}
<footer class="footer">
  <div class="container footer-inner">
    <span>© {{ now.Year }} {{ .Site.Params.author }}</span>
    <span>{{ .Site.Params.location }}</span>
    <span class="footer-spacer"></span>
    <a href="{{ .Site.Params.github }}" target="_blank" rel="noopener noreferrer">GitHub</a>
    <a href="{{ .Site.Params.linkedin }}" target="_blank" rel="noopener noreferrer">LinkedIn</a>
    <span>Built with Hugo</span>
  </div>
</footer>
